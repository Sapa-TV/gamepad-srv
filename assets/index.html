<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Gamepad</title>
    <link rel="stylesheet" type="text/css" href="style.css" />
  </head>
  <body>
    <div id="status" class="status disconnected"></div>
    <div class="gamepad">
      <img class="bg" src="images/backend.png" alt="background" />
      <img class="indicator" src="images/paw.png" />
      
      <img class="btn" data-name="DPadUp" src="images/dpad-up.png" />
      <img class="btn" data-name="DPadDown" src="images/dpad-down.png" />
      <img class="btn" data-name="DPadLeft" src="images/dpad-left.png" />
      <img class="btn" data-name="DPadRight" src="images/dpad-right.png" />
      
      <img class="btn" data-name="South" src="images/a.png" />
      <img class="btn" data-name="East" src="images/b.png" />
      <img class="btn" data-name="West" src="images/x.png" />
      <img class="btn" data-name="North" src="images/y.png" />
      
      <img class="btn" data-name="LeftShoulder" src="images/lb.png" />
      <img class="btn" data-name="RightShoulder" src="images/rb.png" />
      <img class="btn" data-name="LeftTrigger" src="images/lt.png" />
      <img class="btn" data-name="RightTrigger" src="images/rt.png" />
      
      <img class="stick" data-name="LeftStick" src="images/left.png" />
      <img class="stick-active" data-name="LeftStick" src="images/left-active.png" />
      
      <img class="stick" data-name="RightStick" src="images/right.png" />
      <img class="stick-active" data-name="RightStick" src="images/right-active.png" />
      
      <img class="btn" data-name="Select" src="images/select.png" />
      <img class="btn" data-name="Start" src="images/start.png" />
    </div>
    <script src="script.js"></script>
  </body>
</html>
