name: Push github release

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      changelog:
        required: false
        type: string
        default: "No changelog provided"
  workflow_dispatch:
    inputs:
      version:
        description: "Deploy version"
        required: true
        type: string
      changelog:
        required: false
        type: string
        default: "No changelog provided"

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: release-zip
          path: ./downloads

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: Release ${{ inputs.version }}
          body: ${{ inputs.changelog }}
          files: ./downloads/gamepad-srv.zip
